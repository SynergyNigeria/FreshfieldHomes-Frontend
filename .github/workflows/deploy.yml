name: Deploy to Cloudflare Pages

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci --legacy-peer-deps

      - name: Build
        working-directory: frontend
        env:
          NEXT_PUBLIC_API_BASE_URL: https://freshfieldhomes.pythonanywhere.com/api
        run: npx @opennextjs/cloudflare build

      - name: Deploy
        working-directory: frontend
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: f3939541bde0dec97a7d9bff91b93aef
        run: npx wrangler pages deploy .open-next/assets --project-name freshfields-home --branch main
